<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - x4nox_x</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; font-family: 'Oswald', sans-serif; color: white; }
        .login-card { background-color: #0a0a0f; border: 2px solid #8b5cf6; border-radius: 1.5rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    
    <div class="login-card w-full max-w-md p-8 shadow-2xl">
        <div class="text-center mb-8">
            <img src="xano.png" alt="Logo" class="w-32 mx-auto mb-4">
            <h1 class="text-2xl font-bold uppercase italic text-indigo-400">Acesso Restrito</h1>
            <p class="text-zinc-500 text-sm italic">Manager Dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 mb-2 italic">E-mail do Streamer</label>
                <input type="email" id="email" required class="w-full bg-[#1a2635] border border-zinc-800 p-4 rounded-xl outline-none focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 mb-2 italic">Password</label>
                <input type="password" id="password" required class="w-full bg-[#1a2635] border border-zinc-800 p-4 rounded-xl outline-none focus:border-indigo-500 transition-all">
            </div>
            
            <button type="submit" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-black uppercase italic tracking-widest transition-all shadow-lg shadow-indigo-600/20 active:scale-95">
                Entrar no Painel
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sUrl = 'https://fndbcsreimpdgbubytqn.supabase.co';
        const sKey = 'sb_publishable_NUs_857Sa2uLA9vEMBj7RQ_wjd69D_c';
        const supabaseClient = supabase.createClient(sUrl, sKey);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerText = "A verificar...";
            btn.disabled = true;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Erro: " + error.message);
                btn.innerText = "Entrar no Painel";
                btn.disabled = false;
            } else {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
