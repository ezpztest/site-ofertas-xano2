<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x4nox_x - Ofertas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; font-family: 'Oswald', sans-serif; color: white; margin: 0; min-height: 100vh; }
        .bento-card { background-color: #0a0a0f; border: 2px solid #8b5cf6; border-radius: 1.5rem; overflow: hidden; }
        .text-neon-purple { color: #a855f7; }
    </style>
</head>
<body class="flex flex-col">
    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
        <video autoplay loop muted playsinline class="min-w-full min-h-full object-cover">
            <source src="logo.mp4.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-black/50"></div>
    </div>

    <main class="w-full flex flex-col items-center pt-10 px-6">
        <div class="pt-8 mb-12">
            <img src="xano.png" alt="Logo x4nox_x" class="w-40 md:w-48 h-auto object-contain">
        </div>

        <!-- CONTAINER DINÂMICO -->
        <div id="bonus-container" class="w-full max-w-screen-2xl grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-16">
            <!-- Os cards serão injetados aqui -->
        </div>
    </main>

    <footer class="w-full py-10 flex justify-center items-center gap-8">
        <a href="https://www.twitch.tv/x4nox_x" target="_blank" class="text-gray-400 hover:text-[#a855f7] text-4xl"><i class="fa-brands fa-twitch"></i></a>
        <a href="https://www.youtube.com/@TEU_CANAL" target="_blank" class="text-gray-400 hover:text-red-600 text-4xl"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://discord.gg/TEU_CONVITE" target="_blank" class="text-gray-400 hover:text-[#5865F2] text-4xl"><i class="fa-brands fa-discord"></i></a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sUrl = 'https://fndbcsreimpdgbubytqn.supabase.co';
        const sKey = 'sb_publishable_NUs_857Sa2uLA9vEMBj7RQ_wjd69D_c';
        const supabaseClient = supabase.createClient(sUrl, sKey);

        async function carregarBonus() {
            const { data: bonusList, error } = await supabaseClient
                .from('bonus_config')
                .select('*')
                .order('id', { ascending: true });

            if (error) return console.error(error);

            const container = document.getElementById('bonus-container');
            container.innerHTML = '';

            bonusList.forEach(bonus => {
                container.innerHTML += `
                <div class="bento-card p-4 flex flex-col md:flex-row gap-4">
                    <div class="flex-1 bg-[#1a2635] rounded-xl flex items-center justify-center p-8 min-h-[250px]">
                        <img src="${bonus.imagem_url || 'casino1.png.png'}" class="w-full h-auto max-h-[250px] object-contain">
                    </div>
                    <div class="flex-1 flex flex-col gap-4">
                        <div class="bg-[#1a2635] rounded-xl p-4 text-center border-t-4 border-gray-700">
                            <div class="text-[10px] uppercase text-gray-400 mb-2 font-bold italic">Bónus de Boas Vindas</div>
                            <div class="text-3xl font-bold text-neon-purple italic uppercase">${bonus.valor}</div>
                            <div class="text-[10px] uppercase text-gray-400 mt-1 italic">No primeiro depósito</div>
                        </div>
                        <div class="bg-[#1a2635] rounded-xl p-4 text-center flex-1 flex flex-col justify-center border border-gray-700">
                            <div class="text-[10px] uppercase text-gray-400 mb-1 italic">Codigo Promocional</div>
                            <div class="text-5xl font-black text-neon-purple italic tracking-widest">${bonus.codigo}</div>
                        </div>
                    </div>
                </div>`;
            });
        }

        window.onload = carregarBonus;
        supabaseClient.channel('realtime-bonus').on('postgres_changes', { event: '*', schema: 'public', table: 'bonus_config' }, carregarBonus).subscribe();
    </script>
</body>
</html>
